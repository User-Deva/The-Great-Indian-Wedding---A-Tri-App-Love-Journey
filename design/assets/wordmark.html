<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wordmark · The Great Indian Wedding</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg-page);
      padding: 60px 40px;
    }
    .mark {
      text-align: center;
      max-width: 920px;
    }
    .mark .h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(48px, 8vw, 110px);
      line-height: 1.0;
      letter-spacing: 0.2px;
      background: linear-gradient(135deg, #B71C1C 0%, #C2185B 50%, #00695C 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 18px;
    }
    .mark .h2 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(20px, 2.6vw, 32px);
      color: rgba(0,0,0,0.65);
      margin-bottom: 14px;
    }
    .mark .h3 {
      font-family: var(--font-script);
      font-weight: 400;
      font-size: clamp(20px, 2.4vw, 30px);
      color: #C2185B;
    }
    .marks-row {
      display: flex;
      gap: 18px;
      margin-top: 60px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .app-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      box-shadow: var(--shadow-card);
    }
  </style>
</head>
<body>
  <div class="mark">
    <div class="h1">The Great Indian Wedding</div>
    <div class="h2">A Tri-App Love Journey</div>
    <div class="h3">🪷 Where destinies meet over chai</div>

    <div class="marks-row">
      <span class="app-pill" style="background:#8FAF7E;">✨ Rishta</span>
      <span class="app-pill" style="background:#B71C1C;">💍 Shaadi Sajao</span>
      <span class="app-pill" style="background:#00695C;">✈️ Jannat Safar</span>
    </div>
  </div>
</body>
</html>
