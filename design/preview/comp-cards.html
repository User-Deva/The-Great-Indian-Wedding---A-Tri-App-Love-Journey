<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_card.css" />
</head><body>

<div class="col">
  <div class="label">Card · base · accent · interactive</div>
  <div class="row" style="gap:12px;align-items:stretch">
    <div style="flex:1;background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.06);padding:18px">
      <div style="font-weight:700;margin-bottom:4px">Quick stat</div>
      <div style="font-family:var(--font-display);font-size:28px;font-weight:700;color:#B71C1C">₹4,80,000</div>
      <div class="meta">Total budget</div>
    </div>
    <div style="flex:1.4;background:#fff;border-radius:16px;box-shadow:0 4px 18px rgba(0,0,0,.06);border:2px solid #B71C1C;padding:18px">
      <span style="background:#e7f0fb;color:#1f4f87;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600">Current stage · MATCHED</span>
      <div style="font-weight:700;margin-top:8px;font-size:15px">You matched. Now pick a venue and lock the first date.</div>
      <div class="meta" style="margin-top:6px">Hopeful, fresh. Motif: henna patterns.</div>
    </div>
  </div>
</div>
</body></html>
