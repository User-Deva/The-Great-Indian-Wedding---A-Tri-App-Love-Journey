<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_card.css" />
</head><body>

<div class="col">
  <div class="label">Shadows · single-layer, warm-grey, low spread</div>
  <div class="row" style="gap:14px;align-items:stretch;flex-wrap:wrap">
    <div class="stack" style="align-items:center;gap:6px"><div style="width:96px;height:62px;background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.06)"></div><div class="mono">--shadow-card</div></div>
    <div class="stack" style="align-items:center;gap:6px"><div style="width:96px;height:62px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)"></div><div class="mono">--shadow-card-2</div></div>
    <div class="stack" style="align-items:center;gap:6px"><div style="width:96px;height:62px;background:#B71C1C;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.12)"></div><div class="mono">--shadow-button</div></div>
    <div class="stack" style="align-items:center;gap:6px"><div style="width:96px;height:62px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.15)"></div><div class="mono">--shadow-hover</div></div>
    <div class="stack" style="align-items:center;gap:6px"><div style="width:46px;height:46px;background:#8FAF7E;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;box-shadow:0 4px 10px rgba(0,0,0,.12)">💞</div><div class="mono">--shadow-chip</div></div>
  </div>
</div>
</body></html>
