      <input type="radio" name="u" checked style="accent-color:#FFFFF0"/>
      <div><div style="font-weight:700">Aarav Mehta</div><div style="font-size:12px;opacity:.85">aarav@example.com</div></div>
    </label>
  </div>
  <input placeholder="Search vendors…" style="padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:#fff;font-family:var(--font-body);font-size:14px;max-width:320px"/>
