<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_card.css" />
</head><body>

<div class="col">
  <div class="label">Corner radii · round, never sharp</div>
  <div class="row" style="gap:16px;align-items:flex-end">
    <div class="stack" style="align-items:center;gap:8px"><div style="width:72px;height:48px;background:#fff;border:1px solid var(--line-2);border-radius:8px;box-shadow:var(--shadow-card-2)"></div><div class="mono">8px</div><div class="meta">inset chip</div></div>
    <div class="stack" style="align-items:center;gap:8px"><div style="width:72px;height:48px;background:#fff;border:1px solid var(--line-2);border-radius:10px;box-shadow:var(--shadow-card-2)"></div><div class="mono">10px</div><div class="meta">button / input</div></div>
    <div class="stack" style="align-items:center;gap:8px"><div style="width:72px;height:48px;background:#fff;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-card-2)"></div><div class="mono">12px</div><div class="meta">timeline tile</div></div>
    <div class="stack" style="align-items:center;gap:8px"><div style="width:72px;height:48px;background:#fff;border:1px solid var(--line-2);border-radius:16px;box-shadow:var(--shadow-card)"></div><div class="mono">16px</div><div class="meta">card (signature)</div></div>
    <div class="stack" style="align-items:center;gap:8px"><div style="width:72px;height:48px;background:#fff;border:1px solid var(--line-2);border-radius:999px;box-shadow:var(--shadow-card-2)"></div><div class="mono">999</div><div class="meta">badge / pill</div></div>
  </div>
</div>
</body></html>
