<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_card.css" />
</head><body>
<div class="col">
  <div class="row" style="justify-content:space-between;align-items:baseline;">
    <div class="label">Per-app signature colours · constant, never theme-flipped</div>
    <div class="mono">--app-rishta · --app-shaadi · --app-jannat</div>
  </div>
  <div class="row" style="gap:10px">
    <div class="swatch grow" style="background:#0E0E0E;color:#D4AF37;border:1px solid #D4AF37">
      <div class="row" style="justify-content:space-between;align-items:center">
        <div class="name" style="color:#D4AF37">✨ Rishta</div>
        <div style="font-size:22px;color:#D4AF37">✨</div>
      </div>
      <div class="hex" style="color:#D4AF37">#0E0E0E + #D4AF37</div>
    </div>
    <div class="swatch grow" style="background:#B71C1C;color:#fff">
      <div class="row" style="justify-content:space-between;align-items:center">
        <div class="name">💍 Shaadi Sajao</div>
        <div style="font-size:22px">💍</div>
      </div>
      <div class="hex">#B71C1C</div>
    </div>
    <div class="swatch grow" style="background:#00695C;color:#fff">
      <div class="row" style="justify-content:space-between;align-items:center">
        <div class="name">✈️ Jannat Safar</div>
        <div style="font-size:22px">✈️</div>
      </div>
      <div class="hex">#00695C</div>
    </div>
  </div>
</div>
</body></html>
