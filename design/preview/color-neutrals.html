<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_card.css" />
<style>:root { --card-h: 200px; }</style>
</head><body>

<div class="col">
  <div class="label">Neutrals · warm, never pure white or black</div>
  <div class="row" style="gap:10px">
    <div class="swatch grow" style="background:#FFF8EF;color:#1a1a1a"><div class="name">Page</div><div class="hex">#FFF8EF</div></div>
    <div class="swatch grow" style="background:#FFFFFF;color:#1a1a1a;border:1px solid var(--line-2)"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch grow" style="background:#FAFAFA;color:#1a1a1a;border:1px solid var(--line-2)"><div class="name">Surface 2</div><div class="hex">#FAFAFA</div></div>
    <div class="swatch grow" style="background:#1a1a1a;color:#fff"><div class="name">Ink 1</div><div class="hex">#1a1a1a</div></div>
  </div>
  <div class="row" style="gap:10px">
    <div class="swatch grow" style="background:rgba(0,0,0,0.7);color:#fff"><div class="name">Ink 2</div><div class="hex">rgba(0,0,0,0.70)</div></div>
    <div class="swatch grow" style="background:rgba(0,0,0,0.55);color:#fff"><div class="name">Ink 3</div><div class="hex">rgba(0,0,0,0.55)</div></div>
    <div class="swatch grow" style="background:rgba(0,0,0,0.4);color:#fff"><div class="name">Ink 4</div><div class="hex">rgba(0,0,0,0.40)</div></div>
    <div class="swatch grow" style="background:#fff;color:#1a1a1a;border:1px solid rgba(0,0,0,0.16)"><div class="name">Line 3</div><div class="hex">rgba(0,0,0,0.16)</div></div>
  </div>
</div>
</body></html>
