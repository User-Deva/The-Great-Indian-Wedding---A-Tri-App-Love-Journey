<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="_card.css" />
<style>:root { --card-h: 200px; }</style>
</head><body>

<div class="col">
  <div class="label">Semantic tones · Badge palette</div>
  <div class="row" style="gap:10px;flex-wrap:wrap">
    <span style="background:#eef0f5;color:#444;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600">Neutral</span>
    <span style="background:#e6f4ea;color:#1b6e3a;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600">Positive</span>
    <span style="background:#fff3e0;color:#a35400;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600">Warning</span>
    <span style="background:#fdecea;color:#a8201a;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600">Danger</span>
    <span style="background:#e7f0fb;color:#1f4f87;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600">Info</span>
  </div>
  <div class="divider"></div>
  <div class="label">Compatibility score scale · Rishta MatchCard</div>
  <div class="row" style="gap:14px">
    <div class="row" style="gap:8px"><div style="width:34px;height:34px;border-radius:50%;background:#4CAF50;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">90%</div><div class="meta">≥85 · high</div></div>
    <div class="row" style="gap:8px"><div style="width:34px;height:34px;border-radius:50%;background:#2196F3;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">72%</div><div class="meta">65–84 · mid</div></div>
    <div class="row" style="gap:8px"><div style="width:34px;height:34px;border-radius:50%;background:#FF9800;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px">58%</div><div class="meta">&lt;65 · low</div></div>
  </div>
</div>
</body></html>
